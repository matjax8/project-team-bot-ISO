<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Project Team</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f8fafc; }

    .modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.8); display:flex; align-items:center; justify-content:center; z-index:50; }
    .modal-card { background:white; border-radius:12px; padding:48px 40px; max-width:400px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,.3); animation:slideUp .3s ease-out; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .header-bar { background:linear-gradient(135deg,#1e293b,#0f172a); color:white; padding:20px 32px; display:flex; justify-content:space-between; align-items:center; }
    .header-title { font-size:24px; font-weight:700; }
    .iso-badge { background:rgba(255,255,255,.15); padding:4px 12px; border-radius:6px; font-size:11px; font-weight:600; border:1px solid rgba(255,255,255,.2); }

    .brief-section { background:white; padding:32px; margin:24px 32px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
    .brief-textarea { width:100%; min-height:100px; padding:16px; border:2px solid #e2e8f0; border-radius:8px; font-size:14px; font-family:inherit; resize:vertical; line-height:1.6; }
    .brief-textarea:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.1); }

    .agent-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; padding:32px; max-width:1400px; }
    .agent-grid>:last-child { grid-column:1/-1; width:50%; margin:0 auto; }
    @media(max-width:1024px) { .agent-grid{grid-template-columns:1fr;padding:20px} .agent-grid>:last-child{grid-column:auto;width:100%} }

    .agent-card { background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.06); display:flex; flex-direction:column; align-items:center; transition:all .3s; position:relative; min-height:420px; }
    .agent-card.idle { opacity:.6; }
    .agent-card.speaking { animation:pulse 2s infinite; border:2px solid #3b82f6; }
    .agent-card.complete { border:2px solid #22c55e; background:linear-gradient(135deg,#f0fdf4,white); }
    @keyframes pulse { 0%,100%{box-shadow:0 0 20px rgba(59,130,246,.3)} 50%{box-shadow:0 0 30px rgba(59,130,246,.5)} }

    .avatar { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; color:white; margin-bottom:12px; }
    .avatar.pm{background:linear-gradient(135deg,#22c55e,#16a34a)} .avatar.researcher{background:linear-gradient(135deg,#3b82f6,#2563eb)} .avatar.report{background:linear-gradient(135deg,#f59e0b,#d97706)} .avatar.critic{background:linear-gradient(135deg,#ef4444,#dc2626)} .avatar.scheduler{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}

    .role-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:.5px; margin-bottom:8px; text-transform:uppercase; }
    .role-badge.pm{background:#dcfce7;color:#166534} .role-badge.researcher{background:#dbeafe;color:#1e40af} .role-badge.report{background:#fef3c7;color:#92400e} .role-badge.critic{background:#fee2e2;color:#991b1b} .role-badge.scheduler{background:#ede9fe;color:#5b21b6}

    .agent-name { font-size:16px; font-weight:700; color:#1e293b; margin-bottom:12px; text-align:center; }

    .response-container { width:100%; flex:1; overflow-y:auto; margin-top:12px; padding:14px; background:#f8fafc; border-radius:8px; border:1px solid #e2e8f0; font-size:13px; line-height:1.7; color:#334155; }
    .response-container:empty::before { content:attr(data-placeholder); color:#cbd5e1; }

    /* ── Markdown inside response cards (web view) ── */
    .md h2 { font-size:15px; font-weight:700; color:#0f172a; margin:14px 0 6px; border-bottom:1px solid #e2e8f0; padding-bottom:4px; }
    .md h3 { font-size:14px; font-weight:700; color:#1e293b; margin:10px 0 4px; }
    .md h4 { font-size:13px; font-weight:600; color:#334155; margin:8px 0 4px; }
    .md p  { margin:5px 0; }
    .md ul,.md ol { margin:6px 0 6px 22px; }
    .md li { margin:3px 0; line-height:1.6; }
    .md strong { font-weight:700; color:#0f172a; }
    .md table { width:100%; border-collapse:collapse; margin:10px 0; font-size:12px; }
    .md th { background:#e2e8f0; font-weight:700; text-align:left; padding:6px 8px; border:1px solid #cbd5e1; }
    .md td { padding:5px 8px; border:1px solid #e2e8f0; }
    .md tr:nth-child(even) { background:#f1f5f9; }
    .md blockquote { border-left:3px solid #3b82f6; padding-left:12px; margin:8px 0; color:#64748b; }
    .md hr { border:none; border-top:1px solid #e2e8f0; margin:12px 0; }
    .md code { background:#e2e8f0; padding:2px 5px; border-radius:3px; font-family:'Courier New',monospace; font-size:12px; }
    .md pre { background:#f1f5f9; color:#1e293b; padding:14px; border-radius:6px; border:1px solid #cbd5e1; overflow-x:auto; margin:10px 0; font-size:12px; font-family:'Courier New',monospace; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
    .md pre code { background:transparent; color:inherit; padding:0; font-size:12px; }

    .checkmark { position:absolute; top:12px; right:12px; width:24px; height:24px; background:#22c55e; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:14px; }

    .action-bar { background:white; padding:24px 32px; display:flex; gap:12px; box-shadow:0 -2px 8px rgba(0,0,0,.04); flex-wrap:wrap; }
    .btn { padding:10px 24px; border-radius:8px; border:none; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary { background:#3b82f6; color:white; }
    .btn-primary:hover { background:#2563eb; }
    .btn-primary:disabled { background:#cbd5e1; cursor:not-allowed; }
    .btn-secondary { background:#e2e8f0; color:#334155; }

    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:white; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .error-message { background:#fee2e2; color:#991b1b; padding:12px 16px; border-radius:8px; border-left:4px solid #dc2626; margin:12px 0; font-size:13px; }
    .success-message { background:#dcfce7; color:#166534; padding:12px 16px; border-radius:8px; border-left:4px solid #22c55e; margin:12px 0; font-size:13px; }
    .typing-cursor { display:inline-block; width:2px; height:1em; background:#334155; margin-left:2px; animation:blink .7s infinite; }
    @keyframes blink { 0%,49%,100%{opacity:1} 50%,99%{opacity:0} }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  marked.setOptions({ breaks: true, gfm: true });

  const AGENTS = [
    { id:'pm',        name:'Project Manager',   role:'PM',        initials:'PM', color:'#22c55e' },
    { id:'researcher',name:'Research Analyst',   role:'Researcher',initials:'RA', color:'#3b82f6' },
    { id:'report',    name:'Report Creator',     role:'Report',    initials:'RC', color:'#f59e0b' },
    { id:'critic',    name:'Critical Reviewer',  role:'Critic',    initials:'CR', color:'#ef4444' },
    { id:'scheduler', name:'Schedule Optimizer', role:'Scheduler', initials:'SO', color:'#8b5cf6' },
  ];

  const PORTRAIT_AGENTS = AGENTS.filter(a => a.id !== 'scheduler');
  const SCHEDULER_AGENT = AGENTS.find(a => a.id === 'scheduler');

  const colorClass = { pm:'pm', researcher:'researcher', report:'report', critic:'critic', scheduler:'scheduler' };

  function md(text) {
    if (!text) return '';
    try { return marked.parse(text); } catch { return text; }
  }

  /* ══════════════════════════════════════════════════════════
     SHARED PDF STYLES — black on white, executive quality
     ══════════════════════════════════════════════════════════ */
  const PDF_CSS = `
    * { box-sizing:border-box; }
    body, div { font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#1e293b; line-height:1.6; }
    h2 { font-size:14px; font-weight:700; color:#0f172a; margin:12px 0 5px; border-bottom:1px solid #cbd5e1; padding-bottom:3px; }
    h3 { font-size:12px; font-weight:700; color:#1e293b; margin:10px 0 4px; }
    h4 { font-size:11px; font-weight:600; color:#334155; margin:8px 0 3px; }
    p  { margin:4px 0; font-size:11px; }
    ul,ol { margin:4px 0 4px 18px; font-size:11px; }
    li { margin:2px 0; line-height:1.6; }
    strong { font-weight:700; }
    table { width:100%; border-collapse:collapse; margin:8px 0; font-size:10px; }
    th { background:#e2e8f0; font-weight:700; text-align:left; padding:4px 6px; border:1px solid #94a3b8; }
    td { padding:3px 6px; border:1px solid #cbd5e1; }
    tr:nth-child(even) { background:#f8fafc; }
    pre { background:#f8fafc; color:#1e293b; padding:10px; border-radius:4px; border:1px solid #cbd5e1; font-family:'Courier New',monospace; font-size:9px; line-height:1.4; white-space:pre-wrap; word-break:break-word; margin:6px 0; }
    code { font-family:'Courier New',monospace; font-size:10px; background:#f1f5f9; padding:1px 3px; border-radius:2px; color:#1e293b; }
    pre code { background:transparent; padding:0; font-size:9px; }
    blockquote { border-left:3px solid #3b82f6; padding-left:10px; color:#64748b; margin:6px 0; font-size:11px; }
    hr { border:none; border-top:1px solid #e2e8f0; margin:8px 0; }
  `;

  /* ══════════════════════════════════════════════════════════
     BUILD COVER PAGE HTML
     ══════════════════════════════════════════════════════════ */
  function buildCoverHtml() {
    const dateStr = new Date().toLocaleDateString('en-US', {
      year:'numeric', month:'long', day:'numeric'
    });
    return `
      <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:250mm; padding:40px; text-align:center;">
        <div style="margin-bottom:40px;">
          <div style="font-size:36px; font-weight:800; color:#0f172a; letter-spacing:-0.5px;">Virtual Project Team</div>
          <div style="font-size:18px; color:#3b82f6; font-weight:600; margin-top:12px;">Executive Project Analysis</div>
        </div>
        <div style="width:80px; height:2px; background:#3b82f6; margin:20px auto;"></div>
        <div style="margin-top:20px;">
          <div style="font-size:13px; color:#64748b; margin:6px 0;">ISO 21500:2021 Compliant</div>
          <div style="font-size:13px; color:#64748b; margin:6px 0;">${dateStr}</div>
        </div>
        <div style="margin-top:60px; padding:16px 32px; border:1px solid #e2e8f0; border-radius:8px; background:#f8fafc;">
          <div style="font-size:10px; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Analysis Team</div>
          <div style="font-size:11px; color:#475569; line-height:2;">
            Project Manager &bull; Research Analyst &bull; Report Creator &bull; Critical Reviewer &bull; Schedule Optimizer
          </div>
        </div>
      </div>
    `;
  }

  /* ══════════════════════════════════════════════════════════
     BUILD ONE AGENT SECTION (portrait)
     ══════════════════════════════════════════════════════════ */
  function buildAgentSection(agent, responses, isFirst) {
    const content = responses[agent.id] ? md(responses[agent.id]) : '<em>No output</em>';
    const pageBreak = isFirst ? '' : 'page-break-before:always;';
    return `
      <div style="${pageBreak} padding:30px 35px 20px 35px;">
        <div style="display:flex; align-items:center; gap:14px; margin-bottom:16px; padding-bottom:12px; border-bottom:2px solid ${agent.color};">
          <div style="width:40px;height:40px;border-radius:50%;background:${agent.color};display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:15px;flex-shrink:0;">
            ${agent.initials}
          </div>
          <div>
            <div style="font-size:16px;font-weight:700;color:#0f172a;">${agent.name}</div>
            <div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;">${agent.role}</div>
          </div>
        </div>
        <div style="font-size:11px; line-height:1.7; color:#334155;">
          ${content}
        </div>
      </div>`;
  }

  /* ══════════════════════════════════════════════════════════
     BUILD PORTRAIT PDF HTML (cover + 4 agents, NOT scheduler)
     ══════════════════════════════════════════════════════════ */
  function buildPortraitHtml(responses) {
    const cover = buildCoverHtml();
    const sections = PORTRAIT_AGENTS.map((a, i) => buildAgentSection(a, responses, false)).join('');

    return `
      <div>
        ${cover}
        ${sections}
      </div>
      <style>${PDF_CSS}</style>
    `;
  }

  /* ══════════════════════════════════════════════════════════
     BUILD LANDSCAPE SCHEDULER/GANTT HTML
     ══════════════════════════════════════════════════════════ */
  function buildLandscapeHtml(responses) {
    const content = responses['scheduler'] ? md(responses['scheduler']) : '<em>No output</em>';
    return `
      <div style="padding:20px 25px;">
        <div style="display:flex; align-items:center; gap:14px; margin-bottom:14px; padding-bottom:10px; border-bottom:2px solid #8b5cf6;">
          <div style="width:36px;height:36px;border-radius:50%;background:#8b5cf6;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;flex-shrink:0;">
            SO
          </div>
          <div>
            <div style="font-size:15px;font-weight:700;color:#0f172a;">Schedule Optimizer — Gantt Chart &amp; Resourcing</div>
            <div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;">LANDSCAPE VIEW</div>
          </div>
        </div>
        <div style="font-size:10px; line-height:1.6; color:#334155;">
          ${content}
        </div>
        <div style="margin-top:20px; border-top:1px solid #e2e8f0; padding-top:8px; font-size:8px; color:#94a3b8; text-align:center;">
          Virtual Project Team — Schedule &amp; Gantt Chart — ISO 21500:2021
        </div>
      </div>
      <style>${PDF_CSS}
        pre { font-size:8px; line-height:1.3; }
        table { font-size:9px; }
        th { padding:3px 5px; }
        td { padding:2px 5px; }
      </style>
    `;
  }

  /* ══════════════════════════════════════════════════════════
     TWO-PASS PDF EXPORT: Portrait body + Landscape Gantt
     Uses html2pdf for portrait, then adds landscape pages via jsPDF
     ══════════════════════════════════════════════════════════ */
  async function exportFullPdf(responses, onSuccess, onError) {
    const ts = new Date().toISOString().split('T')[0];
    const filename = `Project_Analysis_${ts}.pdf`;

    // ── PASS 1: Portrait pages (cover + 4 agents + end page) ──
    const portraitDiv = document.createElement('div');
    portraitDiv.style.position = 'absolute';
    portraitDiv.style.left = '0';
    portraitDiv.style.top = '0';
    portraitDiv.style.width = '210mm';
    portraitDiv.style.background = '#ffffff';
    portraitDiv.innerHTML = buildPortraitHtml(responses);
    document.body.appendChild(portraitDiv);

    let portraitPdf;
    try {
      portraitPdf = await html2pdf().set({
        margin: [8, 8, 8, 8],
        filename: filename,
        image: { type:'jpeg', quality:0.95 },
        html2canvas: { scale:2, useCORS:true, backgroundColor:'#ffffff', scrollY:0, windowWidth:794 },
        jsPDF: { orientation:'portrait', unit:'mm', format:'a4', compress:true },
        pagebreak: { mode:['css'], before:'.pb-before', after:'.pb-after', avoid:'.pb-avoid' },
      }).from(portraitDiv).toPdf().get('pdf');
    } catch(e) {
      document.body.removeChild(portraitDiv);
      onError(e);
      return;
    }
    document.body.removeChild(portraitDiv);

    // ── PASS 2: Landscape page (Scheduler/Gantt) ──
    const landscapeDiv = document.createElement('div');
    landscapeDiv.style.position = 'absolute';
    landscapeDiv.style.left = '0';
    landscapeDiv.style.top = '0';
    landscapeDiv.style.width = '287mm';
    landscapeDiv.style.background = '#ffffff';
    landscapeDiv.innerHTML = buildLandscapeHtml(responses);
    document.body.appendChild(landscapeDiv);

    let landscapePdf;
    try {
      landscapePdf = await html2pdf().set({
        margin: [8, 8, 8, 8],
        image: { type:'jpeg', quality:0.95 },
        html2canvas: { scale:2, useCORS:true, backgroundColor:'#ffffff', scrollY:0, windowWidth:1123 },
        jsPDF: { orientation:'landscape', unit:'mm', format:'a4', compress:true },
        pagebreak: { mode:['css'] },
      }).from(landscapeDiv).toPdf().get('pdf');
    } catch(e) {
      document.body.removeChild(landscapeDiv);
      // Fall back: save portrait-only
      portraitPdf.save(filename);
      onSuccess('PDF downloaded (landscape section failed)');
      return;
    }
    document.body.removeChild(landscapeDiv);

    // ── MERGE: Render landscape as canvas image, add to portrait PDF ──
    try {
      const landscapeDiv2 = document.createElement('div');
      landscapeDiv2.style.position = 'absolute';
      landscapeDiv2.style.left = '0';
      landscapeDiv2.style.top = '0';
      landscapeDiv2.style.width = '287mm';
      landscapeDiv2.style.background = '#ffffff';
      landscapeDiv2.innerHTML = buildLandscapeHtml(responses);
      document.body.appendChild(landscapeDiv2);

      const canvas = await html2canvas(landscapeDiv2, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        scrollY: 0,
        windowWidth: 1123,
      });
      document.body.removeChild(landscapeDiv2);

      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pageW = 297;
      const pageH = 210;
      const margin = 8;
      const contentW = pageW - margin * 2;
      const contentH = pageH - margin * 2;

      // Calculate how many landscape pages we need
      const imgAspect = canvas.width / canvas.height;
      const fitWidth = contentW;
      const fitHeight = fitWidth / imgAspect;
      const pagesNeeded = Math.ceil(fitHeight / contentH);

      for (let p = 0; p < pagesNeeded; p++) {
        portraitPdf.addPage('a4', 'landscape');
        const srcY = p * (contentH / fitHeight) * canvas.height;
        const srcH = (contentH / fitHeight) * canvas.height;
        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = canvas.width;
        sliceCanvas.height = Math.min(srcH, canvas.height - srcY);
        const ctx = sliceCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, sliceCanvas.width, sliceCanvas.height);
        ctx.drawImage(canvas, 0, srcY, canvas.width, sliceCanvas.height, 0, 0, canvas.width, sliceCanvas.height);
        const sliceData = sliceCanvas.toDataURL('image/jpeg', 0.95);
        const sliceAspect = sliceCanvas.width / sliceCanvas.height;
        const drawW = contentW;
        const drawH = drawW / sliceAspect;
        portraitPdf.addImage(sliceData, 'JPEG', margin, margin, drawW, Math.min(drawH, contentH));
      }

      portraitPdf.save(filename);
      onSuccess('PDF downloaded!');
    } catch(e) {
      // Last resort: save portrait-only
      console.error('Landscape merge failed:', e);
      portraitPdf.save(filename);
      onSuccess('PDF downloaded (portrait only)');
    }
  }


  // ════════════════════════════════════════════════════
  // PASSWORD MODAL
  // ════════════════════════════════════════════════════
  function PasswordModal({ onAuth }) {
    const [password, setPassword] = useState('');
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');

    const handleSubmit = async (e) => {
      e.preventDefault(); setError(''); setLoading(true);
      try {
        const r = await fetch('/auth/verify', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ password }),
        });
        if (!r.ok) throw new Error();
        const d = await r.json();
        if (d.access_token) { localStorage.setItem('auth_token', d.access_token); onAuth(true); }
      } catch { setError('Invalid password.'); }
      finally { setLoading(false); }
    };

    return (
      <div className="modal-overlay">
        <div className="modal-card">
          <h1 style={{fontSize:'28px',fontWeight:700,color:'#1e293b',marginBottom:'12px'}}>Virtual Project Team</h1>
          <p style={{fontSize:'13px',color:'#64748b',marginBottom:'32px'}}>AI-powered ISO 21500 project analysis</p>
          <form onSubmit={handleSubmit}>
            <input type="password" placeholder="Enter team password" value={password}
              onChange={e=>setPassword(e.target.value)} disabled={loading}
              style={{width:'100%',padding:'12px 16px',border:'2px solid #e2e8f0',borderRadius:'8px',fontSize:'14px',marginBottom:'16px',outline:'none'}} />
            {error && <div className="error-message">{error}</div>}
            <button type="submit" disabled={!password||loading} className="btn btn-primary"
              style={{width:'100%',justifyContent:'center'}}>
              {loading ? <><span className="spinner"></span> Verifying...</> : 'Sign In'}
            </button>
          </form>
          <p style={{fontSize:'12px',color:'#94a3b8',marginTop:'20px',textAlign:'center'}}>
            How many PM's to change a light bulb?
          </p>
        </div>
      </div>
    );
  }


  // ════════════════════════════════════════════════════
  // AGENT CARD
  // ════════════════════════════════════════════════════
  function AgentCard({ agent, response, status }) {
    const ref = useRef(null);
    useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [response]);
    const cls = status==='idle' ? 'idle' : status==='speaking' ? 'speaking' : 'complete';

    return (
      <div className={`agent-card ${cls}`}>
        {status==='complete' && <div className="checkmark">✓</div>}
        <div className={`avatar ${colorClass[agent.id]}`}>{agent.initials}</div>
        <div className={`role-badge ${colorClass[agent.id]}`}>{agent.role}</div>
        <div className="agent-name">{agent.name}</div>
        <div className="response-container" ref={ref}
             data-placeholder={status==='idle' ? 'Waiting to analyse...' : ''}>
          {response && <div className="md" dangerouslySetInnerHTML={{__html: md(response)}} />}
          {status==='speaking' && <span className="typing-cursor"></span>}
        </div>
      </div>
    );
  }


  // ════════════════════════════════════════════════════
  // MAIN APP
  // ════════════════════════════════════════════════════
  function App() {
    const [authenticated, setAuthenticated] = useState(false);
    const [brief, setBrief]       = useState('');
    const [responses, setResponses] = useState({});
    const [statuses, setStatuses]   = useState({});
    const [analyzing, setAnalyzing] = useState(false);
    const [exporting, setExporting] = useState(false);
    const [error, setError]         = useState('');
    const [success, setSuccess]     = useState('');

    useEffect(() => { if (localStorage.getItem('auth_token')) setAuthenticated(true); }, []);

    const initStatuses = () => { const s={}; AGENTS.forEach(a=>(s[a.id]='idle')); setStatuses(s); };

    // ── Run analysis ──
    const handleAnalyze = async () => {
      if (!brief.trim()) { setError('Please enter a project brief'); setTimeout(()=>setError(''),3000); return; }
      setError(''); setSuccess(''); setAnalyzing(true); initStatuses(); setResponses({});

      try {
        const res = await fetch('/api/analyze', {
          method:'POST',
          headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${localStorage.getItem('auth_token')}` },
          body: JSON.stringify({ brief }),
        });
        if (!res.ok) throw new Error(`Analysis failed (${res.status})`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream:true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const d = JSON.parse(line);
              if (d.agent && d.status) setStatuses(p=>({...p, [d.agent]: d.status}));
              if (d.agent && d.content) setResponses(p=>({...p, [d.agent]: (p[d.agent]||'')+d.content }));
            } catch {}
          }
        }

        setAnalyzing(false);
        setSuccess('Analysis complete!');
        setTimeout(()=>setSuccess(''),3000);
        AGENTS.forEach(a => setStatuses(p=>({...p,[a.id]:'complete'})));

      } catch (err) {
        setAnalyzing(false);
        setError(`Failed: ${err.message}`);
      }
    };

    // ── Export PDF — two-pass (portrait + landscape Gantt) ──
    const handleExportPDF = async () => {
      setExporting(true);
      setSuccess('Generating executive PDF...');
      try {
        await exportFullPdf(
          responses,
          (msg) => { setExporting(false); setSuccess(msg); setTimeout(()=>setSuccess(''),3000); },
          (err) => { setExporting(false); setError('PDF export failed: ' + err.message); console.error(err); }
        );
      } catch(e) {
        setExporting(false);
        setError('PDF export failed');
        console.error(e);
      }
    };

    const handleNewBrief = () => { setBrief(''); setResponses({}); initStatuses(); setError(''); setSuccess(''); };

    const hasResults = Object.values(responses).some(r => r && r.length > 0);
    const allDone = hasResults && AGENTS.every(a => statuses[a.id] === 'complete');

    if (!authenticated) return <PasswordModal onAuth={setAuthenticated} />;

    return (
      <div style={{minHeight:'100vh',background:'#f8fafc'}}>
        <div className="header-bar">
          <div>
            <div className="header-title">Virtual Project Team</div>
            <div style={{fontSize:'12px',color:'rgba(255,255,255,.7)',marginTop:'4px'}}>AI-Powered Project Analysis</div>
          </div>
          <div className="iso-badge">ISO 21500:2021</div>
        </div>

        <div className="brief-section">
          <label style={{display:'block',marginBottom:'12px',fontSize:'14px',fontWeight:600,color:'#1e293b'}}>Project Brief</label>
          <textarea className="brief-textarea" value={brief}
            placeholder="Describe your project — goals, timeline, team size, challenges, budget, constraints..."
            onChange={e=>setBrief(e.target.value)} disabled={analyzing} />
          {error   && <div className="error-message">{error}</div>}
          {success && <div className="success-message">✓ {success}</div>}
          <button className="btn btn-primary" onClick={handleAnalyze}
            disabled={analyzing||!brief.trim()} style={{marginTop:'16px'}}>
            {analyzing ? <><span className="spinner"></span> Analysing...</> : '→ Analyse with Team'}
          </button>
        </div>

        <div className="agent-grid">
          {AGENTS.map(a => <AgentCard key={a.id} agent={a} response={responses[a.id]||''} status={statuses[a.id]||'idle'} />)}
        </div>

        <div className="action-bar">
          <button className="btn btn-primary" onClick={handleExportPDF} disabled={!allDone||analyzing||exporting}>
            {exporting ? <><span className="spinner"></span> Generating PDF...</> : 'Export PDF'}
          </button>
          <button className="btn btn-secondary" onClick={handleNewBrief} disabled={analyzing}>
            + New Brief
          </button>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
