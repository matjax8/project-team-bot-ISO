<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Project Team</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f8fafc; }

    /* ── Login Modal ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.8); display:flex; align-items:center; justify-content:center; z-index:50; }
    .modal-card { background:white; border-radius:12px; padding:48px 40px; max-width:400px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,.3); animation:slideUp .3s ease-out; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* ── Header ── */
    .header-bar { background:linear-gradient(135deg,#1e293b,#0f172a); color:white; padding:20px 32px; display:flex; justify-content:space-between; align-items:center; }
    .header-title { font-size:24px; font-weight:700; }
    .iso-badge { background:rgba(255,255,255,.15); padding:4px 12px; border-radius:6px; font-size:11px; font-weight:600; border:1px solid rgba(255,255,255,.2); }

    /* ── Brief ── */
    .brief-section { background:white; padding:32px; margin:24px 32px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
    .brief-textarea { width:100%; min-height:100px; padding:16px; border:2px solid #e2e8f0; border-radius:8px; font-size:14px; font-family:inherit; resize:vertical; line-height:1.6; }
    .brief-textarea:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.1); }

    /* ── Agent cards — SINGLE COLUMN stacked ── */
    .agent-stack { display:flex; flex-direction:column; gap:20px; padding:24px 32px; max-width:960px; margin:0 auto; }

    .agent-card { background:white; border-radius:12px; padding:24px; box-shadow:0 2px 8px rgba(0,0,0,.06); transition:all .3s; position:relative; }
    .agent-card.idle { opacity:.6; }
    .agent-card.speaking { animation:pulse 2s infinite; border:2px solid #3b82f6; }
    .agent-card.complete { border:2px solid #22c55e; background:linear-gradient(135deg,#f0fdf4,white); }
    @keyframes pulse { 0%,100%{box-shadow:0 0 20px rgba(59,130,246,.3)} 50%{box-shadow:0 0 30px rgba(59,130,246,.5)} }

    .agent-header { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
    .avatar { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:white; flex-shrink:0; }
    .avatar.pm{background:linear-gradient(135deg,#22c55e,#16a34a)} .avatar.researcher{background:linear-gradient(135deg,#3b82f6,#2563eb)} .avatar.report{background:linear-gradient(135deg,#f59e0b,#d97706)} .avatar.critic{background:linear-gradient(135deg,#ef4444,#dc2626)} .avatar.scheduler{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}

    .agent-meta { flex:1; }
    .agent-name { font-size:17px; font-weight:700; color:#1e293b; }
    .role-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; margin-top:4px; }
    .role-badge.pm{background:#dcfce7;color:#166534} .role-badge.researcher{background:#dbeafe;color:#1e40af} .role-badge.report{background:#fef3c7;color:#92400e} .role-badge.critic{background:#fee2e2;color:#991b1b} .role-badge.scheduler{background:#ede9fe;color:#5b21b6}

    .checkmark { position:absolute; top:16px; right:16px; width:28px; height:28px; background:#22c55e; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:16px; }

    .response-container { width:100%; overflow-y:auto; max-height:500px; padding:16px; background:#f8fafc; border-radius:8px; border:1px solid #e2e8f0; font-size:13px; line-height:1.7; color:#334155; }
    .response-container:empty::before { content:attr(data-placeholder); color:#cbd5e1; }

    /* ── Markdown inside response cards ── */
    .md h2 { font-size:16px; font-weight:700; color:#0f172a; margin:16px 0 6px; border-bottom:1px solid #e2e8f0; padding-bottom:4px; }
    .md h3 { font-size:14px; font-weight:700; color:#1e293b; margin:12px 0 4px; }
    .md h4 { font-size:13px; font-weight:600; color:#334155; margin:8px 0 4px; }
    .md p  { margin:5px 0; }
    .md ul,.md ol { margin:6px 0 6px 22px; }
    .md li { margin:3px 0; line-height:1.6; }
    .md strong { font-weight:700; color:#0f172a; }
    .md table { width:100%; border-collapse:collapse; margin:10px 0; font-size:12px; }
    .md th { background:#e2e8f0; font-weight:700; text-align:left; padding:6px 8px; border:1px solid #cbd5e1; }
    .md td { padding:5px 8px; border:1px solid #e2e8f0; }
    .md tr:nth-child(even) { background:#f1f5f9; }
    .md blockquote { border-left:3px solid #3b82f6; padding-left:12px; margin:8px 0; color:#64748b; }
    .md hr { border:none; border-top:1px solid #e2e8f0; margin:12px 0; }
    .md code { background:#e2e8f0; padding:2px 5px; border-radius:3px; font-family:'Courier New',monospace; font-size:12px; }
    .md pre { background:#f1f5f9; color:#1e293b; padding:14px; border-radius:6px; border:1px solid #cbd5e1; overflow-x:auto; margin:10px 0; font-size:12px; font-family:'Courier New',monospace; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
    .md pre code { background:transparent; color:inherit; padding:0; font-size:12px; }

    /* ── Action bar ── */
    .action-bar { background:white; padding:24px 32px; display:flex; gap:12px; box-shadow:0 -2px 8px rgba(0,0,0,.04); flex-wrap:wrap; position:sticky; bottom:0; }
    .btn { padding:10px 24px; border-radius:8px; border:none; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary { background:#3b82f6; color:white; }
    .btn-primary:hover { background:#2563eb; }
    .btn-primary:disabled { background:#cbd5e1; cursor:not-allowed; }
    .btn-success { background:#22c55e; color:white; }
    .btn-success:hover { background:#16a34a; }
    .btn-success:disabled { background:#cbd5e1; cursor:not-allowed; }
    .btn-secondary { background:#e2e8f0; color:#334155; }

    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:white; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .error-message { background:#fee2e2; color:#991b1b; padding:12px 16px; border-radius:8px; border-left:4px solid #dc2626; margin:12px 0; font-size:13px; }
    .success-message { background:#dcfce7; color:#166534; padding:12px 16px; border-radius:8px; border-left:4px solid #22c55e; margin:12px 0; font-size:13px; }
    .typing-cursor { display:inline-block; width:2px; height:1em; background:#334155; margin-left:2px; animation:blink .7s infinite; }
    @keyframes blink { 0%,49%,100%{opacity:1} 50%,99%{opacity:0} }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  marked.setOptions({ breaks: true, gfm: true });

  const AGENTS = [
    { id:'pm',        name:'Project Manager',   role:'PM',        initials:'PM', color:'#22c55e' },
    { id:'researcher',name:'Research Analyst',   role:'Researcher',initials:'RA', color:'#3b82f6' },
    { id:'report',    name:'Report Creator',     role:'Report',    initials:'RC', color:'#f59e0b' },
    { id:'critic',    name:'Critical Reviewer',  role:'Critic',    initials:'CR', color:'#ef4444' },
    { id:'scheduler', name:'Schedule Optimizer', role:'Scheduler', initials:'SO', color:'#8b5cf6' },
  ];

  const colorClass = { pm:'pm', researcher:'researcher', report:'report', critic:'critic', scheduler:'scheduler' };

  function md(text) {
    if (!text) return '';
    try { return marked.parse(text); } catch { return text; }
  }


  /* ══════════════════════════════════════════════════════════════
     OPEN REPORT IN NEW TAB — pure HTML, no libraries
     The browser's native Print > Save as PDF handles everything.
     Zero blank pages. Perfect pagination. Landscape Gantt page.
     ══════════════════════════════════════════════════════════════ */
  function openReportInNewTab(responses) {
    const dateStr = new Date().toLocaleDateString('en-US', {
      year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'
    });

    // Build sections for first 4 agents (portrait)
    const portraitAgents = AGENTS.filter(a => a.id !== 'scheduler');
    const schedulerAgent = AGENTS.find(a => a.id === 'scheduler');

    const portraitSections = portraitAgents.map(a => {
      const content = responses[a.id] ? md(responses[a.id]) : '<em>No output</em>';
      return `
        <section class="agent-section">
          <div class="section-header" style="border-color:${a.color};">
            <div class="section-avatar" style="background:${a.color};">${a.initials}</div>
            <div>
              <div class="section-name">${a.name}</div>
              <div class="section-role">${a.role}</div>
            </div>
          </div>
          <div class="section-body">${content}</div>
        </section>`;
    }).join('\n');

    // Scheduler / Gantt section (landscape)
    const schedulerContent = responses['scheduler'] ? md(responses['scheduler']) : '<em>No output</em>';
    const schedulerSection = `
      <section class="agent-section landscape-section">
        <div class="section-header" style="border-color:${schedulerAgent.color};">
          <div class="section-avatar" style="background:${schedulerAgent.color};">${schedulerAgent.initials}</div>
          <div>
            <div class="section-name">${schedulerAgent.name} — Gantt Chart &amp; Resourcing</div>
            <div class="section-role">Schedule &amp; Resource Plan &bull; Landscape</div>
          </div>
        </div>
        <div class="section-body">${schedulerContent}</div>
      </section>`;

    const reportHtml = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Analysis Report — Virtual Project Team</title>
  <style>
    /* ── BASE ── */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Roboto,-apple-system,Helvetica,Arial,sans-serif; color:#1e293b; line-height:1.6; background:#fff; }

    /* ── PRINT SETUP ── */
    @media print {
      body { background:#fff; }
      .no-print { display:none !important; }
      .agent-section { page-break-before:always; }
      .agent-section:first-of-type { page-break-before:avoid; }
      .cover-page { page-break-after:always; }
      .landscape-section { page:landscape; }
      @page { margin:15mm 12mm; size:A4 portrait; }
      @page landscape { size:A4 landscape; margin:12mm 10mm; }
    }

    /* ── COVER PAGE ── */
    .cover-page {
      min-height:90vh; display:flex; flex-direction:column; justify-content:center; align-items:center;
      text-align:center; padding:60px 40px; border-bottom:3px solid #e2e8f0;
    }
    .cover-title { font-size:42px; font-weight:800; color:#0f172a; letter-spacing:-1px; }
    .cover-subtitle { font-size:20px; color:#3b82f6; font-weight:600; margin-top:12px; }
    .cover-divider { width:80px; height:3px; background:#3b82f6; margin:32px auto; border-radius:2px; }
    .cover-meta { font-size:14px; color:#64748b; margin:8px 0; }
    .cover-team { margin-top:48px; padding:20px 36px; border:1px solid #e2e8f0; border-radius:10px; background:#f8fafc; }
    .cover-team-label { font-size:10px; color:#94a3b8; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; }
    .cover-team-list { font-size:12px; color:#475569; line-height:2.2; }

    /* ── TOOLBAR (screen only) ── */
    .toolbar { position:sticky; top:0; z-index:100; background:#1e293b; color:white; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; }
    .toolbar-title { font-size:14px; font-weight:600; }
    .toolbar-btn { background:#3b82f6; color:white; border:none; padding:8px 20px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; }
    .toolbar-btn:hover { background:#2563eb; }

    /* ── AGENT SECTIONS ── */
    .agent-section { padding:36px 40px 28px; max-width:900px; margin:0 auto; }
    .section-header { display:flex; align-items:center; gap:16px; margin-bottom:20px; padding-bottom:14px; border-bottom:3px solid #e2e8f0; }
    .section-avatar { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:18px; flex-shrink:0; }
    .section-name { font-size:20px; font-weight:700; color:#0f172a; }
    .section-role { font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }

    .section-body { font-size:13px; line-height:1.8; color:#334155; }

    /* ── MARKDOWN STYLES (black on white, print-friendly) ── */
    .section-body h2 { font-size:17px; font-weight:700; color:#0f172a; margin:20px 0 8px; border-bottom:1px solid #cbd5e1; padding-bottom:4px; }
    .section-body h3 { font-size:14px; font-weight:700; color:#1e293b; margin:14px 0 6px; }
    .section-body h4 { font-size:13px; font-weight:600; color:#334155; margin:10px 0 4px; }
    .section-body p { margin:6px 0; }
    .section-body ul,.section-body ol { margin:6px 0 6px 24px; }
    .section-body li { margin:3px 0; line-height:1.7; }
    .section-body strong { font-weight:700; color:#0f172a; }

    .section-body table { width:100%; border-collapse:collapse; margin:12px 0; font-size:12px; }
    .section-body th { background:#f1f5f9; font-weight:700; text-align:left; padding:8px 10px; border:1px solid #94a3b8; }
    .section-body td { padding:6px 10px; border:1px solid #cbd5e1; }
    .section-body tr:nth-child(even) { background:#f8fafc; }

    /* ── CODE/PRE: BLACK ON WHITE ── */
    .section-body pre {
      background:#f8fafc; color:#1e293b; padding:14px 16px; border-radius:6px;
      border:1px solid #cbd5e1; font-family:'Courier New',monospace; font-size:11px;
      line-height:1.5; white-space:pre; overflow-x:auto; margin:12px 0;
    }
    .section-body code { font-family:'Courier New',monospace; font-size:12px; background:#f1f5f9; padding:2px 5px; border-radius:3px; color:#1e293b; }
    .section-body pre code { background:transparent; padding:0; font-size:11px; }

    .section-body blockquote { border-left:3px solid #3b82f6; padding-left:14px; color:#64748b; margin:8px 0; }
    .section-body hr { border:none; border-top:1px solid #e2e8f0; margin:12px 0; }

    /* ── LANDSCAPE overrides for Gantt ── */
    .landscape-section { max-width:none; padding:24px 30px; }
    .landscape-section .section-body pre { font-size:10px; line-height:1.3; white-space:pre; overflow-x:visible; }
    .landscape-section .section-body table { font-size:11px; }

    /* ── FOOTER ── */
    .report-footer { text-align:center; padding:20px 40px; border-top:2px solid #e2e8f0; margin-top:40px; font-size:10px; color:#94a3b8; }
  </style>
</head>
<body>

  <!-- Toolbar: screen only, hidden on print -->
  <div class="toolbar no-print">
    <div class="toolbar-title">Virtual Project Team — Executive Report</div>
    <div>
      <button class="toolbar-btn" onclick="window.print()" style="margin-right:8px;">Print / Save as PDF</button>
      <button class="toolbar-btn" onclick="window.close()" style="background:#64748b;">Close</button>
    </div>
  </div>

  <!-- Cover Page -->
  <div class="cover-page">
    <div class="cover-title">Virtual Project Team</div>
    <div class="cover-subtitle">Executive Project Analysis</div>
    <div class="cover-divider"></div>
    <div class="cover-meta">ISO 21500:2021 Compliant</div>
    <div class="cover-meta">${dateStr}</div>
    <div class="cover-team">
      <div class="cover-team-label">Analysis Team</div>
      <div class="cover-team-list">
        Project Manager &bull; Research Analyst &bull; Report Creator &bull; Critical Reviewer &bull; Schedule Optimizer
      </div>
    </div>
  </div>

  <!-- Agent Sections (portrait, each on own page when printed) -->
  ${portraitSections}

  <!-- Scheduler / Gantt (landscape when printed) -->
  ${schedulerSection}

  <!-- Footer -->
  <div class="report-footer no-print">
    Virtual Project Team — AI-Powered ISO 21500:2021 Analysis — Confidential
  </div>

</body>
</html>`;

    const newTab = window.open('', '_blank');
    if (newTab) {
      newTab.document.write(reportHtml);
      newTab.document.close();
    } else {
      alert('Pop-up blocked. Please allow pop-ups for this site and try again.');
    }
  }


  // ════════════════════════════════════════════════════
  // PASSWORD MODAL
  // ════════════════════════════════════════════════════
  function PasswordModal({ onAuth }) {
    const [password, setPassword] = useState('');
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');

    const handleSubmit = async (e) => {
      e.preventDefault(); setError(''); setLoading(true);
      try {
        const r = await fetch('/auth/verify', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ password }),
        });
        if (!r.ok) throw new Error();
        const d = await r.json();
        if (d.access_token) { localStorage.setItem('auth_token', d.access_token); onAuth(true); }
      } catch { setError('Invalid password.'); }
      finally { setLoading(false); }
    };

    return (
      <div className="modal-overlay">
        <div className="modal-card">
          <h1 style={{fontSize:'28px',fontWeight:700,color:'#1e293b',marginBottom:'12px'}}>Virtual Project Team</h1>
          <p style={{fontSize:'13px',color:'#64748b',marginBottom:'32px'}}>AI-powered ISO 21500 project analysis</p>
          <form onSubmit={handleSubmit}>
            <input type="password" placeholder="Enter team password" value={password}
              onChange={e=>setPassword(e.target.value)} disabled={loading}
              style={{width:'100%',padding:'12px 16px',border:'2px solid #e2e8f0',borderRadius:'8px',fontSize:'14px',marginBottom:'16px',outline:'none'}} />
            {error && <div className="error-message">{error}</div>}
            <button type="submit" disabled={!password||loading} className="btn btn-primary"
              style={{width:'100%',justifyContent:'center'}}>
              {loading ? <><span className="spinner"></span> Verifying...</> : 'Sign In'}
            </button>
          </form>
          <p style={{fontSize:'12px',color:'#94a3b8',marginTop:'20px',textAlign:'center'}}>
            How many PM's to change a light bulb?
          </p>
        </div>
      </div>
    );
  }


  // ════════════════════════════════════════════════════
  // AGENT CARD (single column layout)
  // ════════════════════════════════════════════════════
  function AgentCard({ agent, response, status }) {
    const ref = useRef(null);
    useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [response]);
    const cls = status==='idle' ? 'idle' : status==='speaking' ? 'speaking' : 'complete';

    return (
      <div className={`agent-card ${cls}`}>
        {status==='complete' && <div className="checkmark">✓</div>}
        <div className="agent-header">
          <div className={`avatar ${colorClass[agent.id]}`}>{agent.initials}</div>
          <div className="agent-meta">
            <div className="agent-name">{agent.name}</div>
            <div className={`role-badge ${colorClass[agent.id]}`}>{agent.role}</div>
          </div>
        </div>
        <div className="response-container" ref={ref}
             data-placeholder={status==='idle' ? 'Waiting to analyse...' : ''}>
          {response && <div className="md" dangerouslySetInnerHTML={{__html: md(response)}} />}
          {status==='speaking' && <span className="typing-cursor"></span>}
        </div>
      </div>
    );
  }


  // ════════════════════════════════════════════════════
  // MAIN APP
  // ════════════════════════════════════════════════════
  function App() {
    const [authenticated, setAuthenticated] = useState(false);
    const [brief, setBrief]       = useState('');
    const [responses, setResponses] = useState({});
    const [statuses, setStatuses]   = useState({});
    const [analyzing, setAnalyzing] = useState(false);
    const [error, setError]         = useState('');
    const [success, setSuccess]     = useState('');

    useEffect(() => { if (localStorage.getItem('auth_token')) setAuthenticated(true); }, []);

    const initStatuses = () => { const s={}; AGENTS.forEach(a=>(s[a.id]='idle')); setStatuses(s); };

    // ── Run analysis ──
    const handleAnalyze = async () => {
      if (!brief.trim()) { setError('Please enter a project brief'); setTimeout(()=>setError(''),3000); return; }
      setError(''); setSuccess(''); setAnalyzing(true); initStatuses(); setResponses({});

      try {
        const res = await fetch('/api/analyze', {
          method:'POST',
          headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${localStorage.getItem('auth_token')}` },
          body: JSON.stringify({ brief }),
        });
        if (!res.ok) throw new Error(`Analysis failed (${res.status})`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream:true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const d = JSON.parse(line);
              if (d.agent && d.status) setStatuses(p=>({...p, [d.agent]: d.status}));
              if (d.agent && d.content) setResponses(p=>({...p, [d.agent]: (p[d.agent]||'')+d.content }));
            } catch {}
          }
        }

        setAnalyzing(false);
        setSuccess('Analysis complete!');
        setTimeout(()=>setSuccess(''),3000);
        AGENTS.forEach(a => setStatuses(p=>({...p,[a.id]:'complete'})));

      } catch (err) {
        setAnalyzing(false);
        setError(`Failed: ${err.message}`);
      }
    };

    // ── Open report in new tab ──
    const handleCreateReport = () => {
      openReportInNewTab(responses);
    };

    const handleNewBrief = () => { setBrief(''); setResponses({}); initStatuses(); setError(''); setSuccess(''); };

    const hasResults = Object.values(responses).some(r => r && r.length > 0);
    const allDone = hasResults && AGENTS.every(a => statuses[a.id] === 'complete');

    if (!authenticated) return <PasswordModal onAuth={setAuthenticated} />;

    return (
      <div style={{minHeight:'100vh',background:'#f8fafc'}}>
        <div className="header-bar">
          <div>
            <div className="header-title">Virtual Project Team</div>
            <div style={{fontSize:'12px',color:'rgba(255,255,255,.7)',marginTop:'4px'}}>AI-Powered Project Analysis</div>
          </div>
          <div className="iso-badge">ISO 21500:2021</div>
        </div>

        <div className="brief-section">
          <label style={{display:'block',marginBottom:'12px',fontSize:'14px',fontWeight:600,color:'#1e293b'}}>Project Brief</label>
          <textarea className="brief-textarea" value={brief}
            placeholder="Describe your project — goals, timeline, team size, challenges, budget, constraints..."
            onChange={e=>setBrief(e.target.value)} disabled={analyzing} />
          {error   && <div className="error-message">{error}</div>}
          {success && <div className="success-message">✓ {success}</div>}
          <button className="btn btn-primary" onClick={handleAnalyze}
            disabled={analyzing||!brief.trim()} style={{marginTop:'16px'}}>
            {analyzing ? <><span className="spinner"></span> Analysing...</> : 'Analyse with Team'}
          </button>
        </div>

        <div className="agent-stack">
          {AGENTS.map(a => <AgentCard key={a.id} agent={a} response={responses[a.id]||''} status={statuses[a.id]||'idle'} />)}
        </div>

        <div className="action-bar">
          <button className="btn btn-success" onClick={handleCreateReport} disabled={!allDone||analyzing}>
            Create Report
          </button>
          <button className="btn btn-secondary" onClick={handleNewBrief} disabled={analyzing}>
            + New Brief
          </button>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
